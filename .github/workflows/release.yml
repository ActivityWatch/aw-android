name: Release

# Full release workflow: bumps versionName in source, commits, tags, and pushes.
# The tag push (via RELEASE_PAT) triggers the Build workflow automatically.
#
# Supports stable and pre-release versions:
#   - Stable (X.Y.Z):         published to Play Store production track + stable GitHub release
#   - Pre-release (X.Y.ZbN):  published to Play Store internal track + GitHub pre-release
#
# Pre-release formats accepted: alpha (X.Y.ZaN), beta (X.Y.ZbN), RC (X.Y.ZrcN)
# Examples: 0.14.0b1, 0.14.0rc1
#
# Prerequisites:
#   - Add a RELEASE_PAT secret: a GitHub PAT with `repo` scope.
#     Using a PAT instead of GITHUB_TOKEN ensures the tag push triggers Build.
#
# Usage: Actions → Release → Run workflow → enter version (e.g. 0.12.2 or 0.14.0b1)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix. Stable: X.Y.Z (e.g. 0.12.2). Pre-release: X.Y.ZbN (e.g. 0.14.0b1)'
        required: true
        type: string

jobs:
  release:
    name: Bump versionName, commit, and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check for RELEASE_PAT
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -z "${{ secrets.RELEASE_PAT }}" ]; then
            echo "::warning::RELEASE_PAT secret is not set. Falling back to GITHUB_TOKEN."
            echo "::warning::GitHub prevents GITHUB_TOKEN pushes from triggering other workflows."
            echo "::warning::After this run, manually trigger the Build workflow:"
            echo "::warning::  gh workflow run build.yml --repo ActivityWatch/aw-android --ref refs/tags/v${VERSION}"
            echo "::warning::Or add RELEASE_PAT (Settings → Secrets → Actions) to fix this permanently."
          fi

      - uses: actions/checkout@v4
        with:
          # RELEASE_PAT is a repo-scoped PAT; its pushes trigger the Build workflow.
          # Falls back to GITHUB_TOKEN (build won't auto-trigger, but tag is still created).
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          # Accept stable (X.Y.Z) and pre-release (X.Y.ZaN / X.Y.ZbN / X.Y.ZrcN) formats.
          # Pre-releases are routed to the Play Store internal track and published as
          # GitHub pre-releases via the nowsprinting/check-version-format-action in Build.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: ${VERSION}"
            echo "::error::Accepted formats: X.Y.Z (stable) or X.Y.ZbN / X.Y.ZrcN (pre-release)"
            echo "::error::Examples: 0.12.2, 0.14.0b1, 0.14.0rc1"
            exit 1
          fi
          if git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists."
            exit 1
          fi

      - name: Bump versionName in mobile/build.gradle
        run: |
          VERSION="${{ inputs.version }}"
          # Replace quoted versionName value; works for both single and double quotes.
          sed -i -E "s/^([[:space:]]*versionName[[:space:]]+)[\"'][^\"']+[\"']/\1'${VERSION}'/" \
            mobile/build.gradle
          # Verify: the line must end with the closing quote (no dangling chars).
          grep -qE "^[[:space:]]*versionName[[:space:]]+'${VERSION}'[[:space:]]*$" \
            mobile/build.gradle || {
              echo "::error::versionName update failed. Current state:"
              grep "versionName" mobile/build.gradle
              exit 1
            }
          echo "Updated versionName to '${VERSION}'"

      - name: Commit and tag
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/build.gradle
          git commit -m "chore: bump versionName to ${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:master
          git push origin "v${VERSION}"
