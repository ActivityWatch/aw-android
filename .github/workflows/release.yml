name: Release

# Full release workflow: bumps versionName in source, commits, tags, and pushes.
# The tag push (via RELEASE_PAT) triggers the Build workflow automatically.
#
# Supports stable and pre-release versions:
#   Stable:      0.14.0         → full Play Store production release
#   Beta:        0.14.0b1       → GitHub pre-release, Play Store internal track
#   Dev:         0.14.0dev20260712 → GitHub pre-release, Play Store internal track
#
# Prerequisites:
#   - Add a RELEASE_PAT secret: a GitHub PAT with `repo` scope.
#     Using a PAT instead of GITHUB_TOKEN ensures the tag push triggers Build.
#
# Usage: Actions → Release → Run workflow → enter version (e.g. 0.14.0 or 0.14.0b1)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, without v prefix (e.g. 0.14.0 for stable, 0.14.0b1 for beta, 0.14.0dev20260712 for dev)'
        required: true
        type: string

jobs:
  release:
    name: Bump versionName, commit, and tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check for RELEASE_PAT
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -z "${{ secrets.RELEASE_PAT }}" ]; then
            echo "::warning::RELEASE_PAT secret is not set. Falling back to GITHUB_TOKEN."
            echo "::warning::GitHub prevents GITHUB_TOKEN pushes from triggering other workflows."
            echo "::warning::After this run, manually trigger the Build workflow:"
            echo "::warning::  gh workflow run build.yml --repo ActivityWatch/aw-android --ref refs/tags/v${VERSION}"
            echo "::warning::Or add RELEASE_PAT (Settings → Secrets → Actions) to fix this permanently."
          fi

      - uses: actions/checkout@v4
        with:
          # RELEASE_PAT is a repo-scoped PAT; its pushes trigger the Build workflow.
          # Falls back to GITHUB_TOKEN (build won't auto-trigger, but tag is still created).
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          # Accept stable (X.Y.Z) and pre-release (X.Y.ZbN, X.Y.ZrcN, X.Y.ZdevYYYYMMDD, etc.)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+[a-z0-9._-]*$ ]]; then
            echo "::error::Version must start with X.Y.Z (e.g. 0.14.0, 0.14.0b1, 0.14.0dev20260712). Got: ${VERSION}"
            exit 1
          fi
          if git rev-parse "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists."
            exit 1
          fi

      - name: Bump versionName in mobile/build.gradle
        run: |
          VERSION="${{ inputs.version }}"
          # Replace quoted versionName value; works for both single and double quotes.
          sed -i -E "s/^([[:space:]]*versionName[[:space:]]+)[\"'][^\"']+[\"']/\1'${VERSION}'/" \
            mobile/build.gradle
          # Verify: the line must end with the closing quote (no dangling chars).
          grep -qE "^[[:space:]]*versionName[[:space:]]+'${VERSION}'[[:space:]]*$" \
            mobile/build.gradle || {
              echo "::error::versionName update failed. Current state:"
              grep "versionName" mobile/build.gradle
              exit 1
            }
          echo "Updated versionName to '${VERSION}'"

      # version set by .ruby-version
      - name: Set up Ruby and install fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: adnsio/setup-age-action@v1.2.0

      - name: Load Fastlane secrets
        env:
          KEY_FASTLANE_API: ${{ secrets.KEY_FASTLANE_API }}
        run: |
          printf "$KEY_FASTLANE_API" > fastlane/api-8546008605074111507-287154-450dc77b365f.json.key
          cat fastlane/api-8546008605074111507-287154-450dc77b365f.json.age \
            | age -d -i fastlane/api-8546008605074111507-287154-450dc77b365f.json.key \
                     -o fastlane/api-8546008605074111507-287154-450dc77b365f.json
          rm fastlane/api-8546008605074111507-287154-450dc77b365f.json.key

      - name: Update versionCode
        uses: Wandalen/wretry.action@v3.8.0_js_action
        with:
          command: bundle exec fastlane update_version
          attempt_limit: 3
          attempt_delay: 20000

      - name: Generate changelog
        run: |
          VERSION_CODE=$(sed -n 's/.*versionCode \([0-9]*\).*/\1/p' mobile/build.gradle | head -1)
          CHANGELOG="fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          if [ -f "$CHANGELOG" ]; then
            echo "Using existing changelog: $CHANGELOG"
            cat "$CHANGELOG"
          else
            # Auto-generate from git log since the previous tag, skipping chore commits
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true)
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" \
                | grep -v "^- chore:" \
                > "$CHANGELOG" || true
            fi
            if [ ! -s "$CHANGELOG" ]; then
              echo "- Bug fixes and stability improvements" > "$CHANGELOG"
            fi
            echo "Generated $CHANGELOG:"
            cat "$CHANGELOG"
          fi

      - name: Commit and tag
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_CODE=$(sed -n 's/.*versionCode \([0-9]*\).*/\1/p' mobile/build.gradle | head -1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/build.gradle
          git add fastlane/metadata/android/en-US/changelogs/
          git commit -m "chore: bump versionName to ${VERSION}, versionCode to ${VERSION_CODE}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:master
          git push origin "v${VERSION}"
